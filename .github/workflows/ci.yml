name: Flutter CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  test:
    name: Analysis & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          cache: true
          # channel: 'stable' # Omit to use default stable or flutter-version from pubspec if available
          # flutter-version: '3.16.0' # Omit to use latest stable

      - name: Install dependencies
        run: flutter pub get

      # Optional: Uncomment if code generation is required
      # - name: Run Build Runner
      #   run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Check Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Static Analysis
        run: flutter analyze

      - name: Execute Tests
        run: flutter test
